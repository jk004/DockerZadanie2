name: Build, Test CVE and Push Multi-Arch Image

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_OWNER: jk11111
  CACHE_REPO: weather-app-cache

jobs:
  build-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      scan_ok: ${{ steps.trivy.outputs.scan_ok }}


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build local image for CVE scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile1
          load: true
          tags: local-image-test:latest

      - name: Run Trivy vulnerability scanner (via docker)
        id: trivy
        run: |
          set -o pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/aquasecurity/trivy:latest \
            image --format json --ignore-unfixed --vuln-type os,library --severity CRITICAL,HIGH local-image-test:latest > trivy.json || true
          CRITICAL_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "scan_ok=false" >> $GITHUB_OUTPUT
          else
            echo "scan_ok=true" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: build-scan
    if: needs.build-scan.outputs.scan_ok == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for GHCR
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Multi-Arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile1
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_OWNER }}/${{ env.CACHE_REPO }}:cache-${{ github.ref_name }}
          cache-to: type=registry,ref=${{ env.DOCKERHUB_OWNER }}/${{ env.CACHE_REPO }}:cache-${{ github.ref_name }},mode=max
